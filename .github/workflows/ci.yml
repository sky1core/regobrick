name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1

  staticcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install honnef.co/go/tools/cmd/staticcheck@2026.1
      - run: staticcheck ./...

  bench-smoke:
    # Compile-and-run check for every benchmark (single iteration). Real
    # measurements are taken manually; see internal/bench/benchcommon.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -run '^$' -bench . -benchtime 1x ./...

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -run '^$' -fuzz FuzzExpandExponent -fuzztime 20s .
      - run: go test -run '^$' -fuzz FuzzParseDecimal -fuzztime 20s .
      - run: go test -run '^$' -fuzz FuzzNumberJSONRoundTrip -fuzztime 20s .
      - run: go test -run '^$' -fuzz FuzzNumberScanFloat -fuzztime 20s .

  govulncheck:
    # Blocking: the toolchain directive is kept at the lowest patch release
    # with zero called vulnerabilities (currently go1.25.12), so a red run
    # means either a newly published vulnerability or a regression — both
    # worth failing CI for. Standard-library findings are resolved by
    # toolchain bumps, not code changes.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  integration:
    # Real-database tests via testcontainers; requires the Docker daemon
    # provided by ubuntu-latest runners.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tests/integration/go.mod
      - run: go test -tags=integration -v ./...
        working-directory: tests/integration
